name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < version.txt)"
          if [ -z "$VERSION" ]; then
            echo "version.txt is empty" >&2
            exit 1
          fi
          if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match version.txt v${VERSION}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build executable
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "dist/Go-Ai-Studio${{ matrix.ext }}" .

      - name: Package release
        run: |
          PACKAGE="Go-Ai-Studio-v${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "release/${PACKAGE}"
          cp "dist/Go-Ai-Studio${{ matrix.ext }}" "release/${PACKAGE}/"
          cp -r workflows "release/${PACKAGE}/"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            python3 -c "import shutil; shutil.make_archive('release/${PACKAGE}', 'zip', 'release', '${PACKAGE}')"
          else
            python3 -c "import shutil; shutil.make_archive('release/${PACKAGE}', 'gztar', 'release', '${PACKAGE}')"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Go-Ai-Studio v${{ steps.version.outputs.version }}
          files: |
            release/Go-Ai-Studio-v${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}.*
          generate_release_notes: true
