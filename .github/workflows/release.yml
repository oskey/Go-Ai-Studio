name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Windows release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < version.txt)"
          if [ -z "$VERSION" ]; then
            echo "version.txt is empty" >&2
            exit 1
          fi
          if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match version.txt v${VERSION}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build executable
        run: |
          mkdir -p dist
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o dist/Go-Ai-Studio.exe .

      - name: Package release
        run: |
          mkdir -p release/Go-Ai-Studio
          cp dist/Go-Ai-Studio.exe release/Go-Ai-Studio/
          cp -r workflows release/Go-Ai-Studio/
          cd release
          zip -r "Go-Ai-Studio-v${{ steps.version.outputs.version }}-windows-amd64.zip" Go-Ai-Studio

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Go-Ai-Studio v${{ steps.version.outputs.version }}
          files: release/Go-Ai-Studio-v${{ steps.version.outputs.version }}-windows-amd64.zip
          generate_release_notes: true
